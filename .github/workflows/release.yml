name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DOTNET_VERSION: "7.0.x"
  PROJECT_PATH: "SabreTools.Serialization.UI.Desktop/SabreTools.Serialization.UI.Desktop.csproj"
  EXECUTABLE_NAME: "SabreTools.Serialization.UI.Desktop"
  APP_NAME: "SabreTools.Serialization"

jobs:
  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Derive version
        id: vars
        shell: bash
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish macOS app
        shell: bash
        run: |
          dotnet publish "$PROJECT_PATH" \
            --configuration Release \
            --runtime osx-x64 \
            --self-contained true \
            --output "$RUNNER_TEMP/publish-macos"

      - name: Package macOS app bundle
        shell: bash
        run: |
          APP_DIR="$RUNNER_TEMP/${APP_NAME}.app"
          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"
          cp -R "$RUNNER_TEMP/publish-macos"/. "$APP_DIR/Contents/MacOS/"
          cp "SabreTools.Serialization.UI.Desktop/Assets/Icons/AppIcon.png" "$APP_DIR/Contents/Resources/AppIcon.png"

          cat > "$APP_DIR/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>CFBundleDisplayName</key>
              <string>${APP_NAME}</string>
              <key>CFBundleExecutable</key>
              <string>${EXECUTABLE_NAME}</string>
              <key>CFBundleIdentifier</key>
              <string>com.whatev-indus.sabretools.serialization</string>
              <key>CFBundleName</key>
              <string>${APP_NAME}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
            </dict>
          </plist>
          EOF

          chmod +x "$APP_DIR/Contents/MacOS/$EXECUTABLE_NAME"
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_DIR" \
            "$RUNNER_TEMP/${APP_NAME}_macOS_v${VERSION}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: ${{ runner.temp }}/${{ env.APP_NAME }}_macOS_v${{ steps.vars.outputs.version }}.zip

  windows:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Derive version
        id: vars
        shell: pwsh
        run: |
          "VERSION=$($env:GITHUB_REF_NAME.Substring(1))" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "version=$($env:GITHUB_REF_NAME.Substring(1))" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish Windows app
        shell: pwsh
        run: |
          dotnet publish $env:PROJECT_PATH `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output "$env:RUNNER_TEMP\publish-windows"

      - name: Package Windows zip
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP "publish-windows"
          $zipPath = Join-Path $env:RUNNER_TEMP "SabreTools.Serialization_Windows_v$env:VERSION.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $publishDir '*') -DestinationPath $zipPath

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: ${{ runner.temp }}/SabreTools.Serialization_Windows_v${{ steps.vars.outputs.version }}.zip

  linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Derive version
        id: vars
        shell: bash
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install AppImage prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Publish Linux app
        shell: bash
        run: |
          dotnet publish "$PROJECT_PATH" \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            --output "$RUNNER_TEMP/publish-linux"

      - name: Package AppImage
        shell: bash
        run: |
          APPDIR="$RUNNER_TEMP/AppDir"
          mkdir -p "$APPDIR/usr/bin"
          cp -R "$RUNNER_TEMP/publish-linux"/. "$APPDIR/usr/bin/"
          cp "SabreTools.Serialization.UI.Desktop/Assets/Icons/AppIcon.png" "$APPDIR/${APP_NAME}.png"

          cat > "$APPDIR/${APP_NAME}.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=${APP_NAME}
          Exec=${EXECUTABLE_NAME}
          Icon=${APP_NAME}
          Categories=Utility;
          EOF

          cat > "$APPDIR/AppRun" <<EOF
          #!/bin/sh
          HERE="\$(dirname "\$(readlink -f "\$0")")"
          exec "\$HERE/usr/bin/${EXECUTABLE_NAME}" "\$@"
          EOF

          chmod +x "$APPDIR/AppRun" "$APPDIR/usr/bin/${EXECUTABLE_NAME}"

          curl -L https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -o "$RUNNER_TEMP/appimagetool.AppImage"
          chmod +x "$RUNNER_TEMP/appimagetool.AppImage"
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 "$RUNNER_TEMP/appimagetool.AppImage" \
            "$APPDIR" \
            "$RUNNER_TEMP/${APP_NAME}_Linux.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: ${{ runner.temp }}/${{ env.APP_NAME }}_Linux.AppImage

  publish-release:
    runs-on: ubuntu-22.04
    needs:
      - macos
      - windows
      - linux

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/artifacts/macos-build/*
            ${{ runner.temp }}/artifacts/windows-build/*
            ${{ runner.temp }}/artifacts/linux-build/*
